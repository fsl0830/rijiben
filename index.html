<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>每日小计</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; font-family: Arial, sans-serif; }
        #app { width: 100%; height: 100%; position: relative; }
        .page { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; }
        .page.active { display: block; }
        #homepage { background: url('1.jpg') no-repeat center center; background-size: cover; }
        #chatpage { background: url('2.jpg') no-repeat center center; background-size: cover; }
        #notebookpage { background: url('2.jpg') no-repeat center center; background-size: cover; }
        .content { padding: 20px; color: #333; text-align: center; padding-top: 60px; text-shadow: 1px 1px 2px rgba(255,255,255,0.8); }
        h1 { font-size: 36px; margin-bottom: 10px; color: #5a4a4a; font-weight: bold; }
        p { font-size: 18px; color: #666; }
        .chatpage-content { display: flex; flex-direction: column; height: 100%; padding: 20px; }
        .chat-header { margin-bottom: 10px; text-align: center; }
        .chat-header h2 { color: #5a4a4a; text-shadow: 1px 1px 2px rgba(255,255,255,0.8); font-size: 24px; }        
        .chat-box { flex: 1; padding: 20px; overflow-y: auto; margin-bottom: 10px; }        
        .chat-input-area { display: flex; gap: 10px; }
        .notebook-content { display: flex; flex-direction: column; height: 100%; }
        .notebook-header { padding: 15px; background: rgba(255, 248, 240, 0.95); text-align: center; border-bottom: 1px solid rgba(255, 182, 193, 0.3); }
        .notebook-header h2 { color: #5a4a4a; font-size: 22px; }
        .notebook-pages { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 80px; }
        .notebook-page { display: none; }
        .notebook-page.active { display: block; }
        .date-nav { display: flex; justify-content: center; align-items: center; gap: 10px; margin: 10px 0; }
        .date-nav button { margin: 0; padding: 8px 12px; border-radius: 15px; }
        .date-nav input { margin: 0; padding: 8px; width: 120px; border: 1px solid rgba(255, 182, 193, 0.5); border-radius: 8px; }
        .notebook-nav { position: fixed; bottom: 0; left: 0; right: 0; display: flex; background: rgba(255, 248, 240, 0.95); padding: 10px; border-top: 1px solid rgba(255, 182, 193, 0.3); }
        .notebook-nav button { flex: 1; margin: 0 5px; padding: 12px; border-radius: 20px; }
        .notebook-nav button.active { background: rgba(255, 182, 193, 0.5); color: #5a4a4a; font-weight: bold; }
        .plan-list { margin: 10px 0; }
        .plan-list p { margin: 5px 0; line-height: 1.5; }
        .task-list { margin: 10px 0; }
        .task-item { display: flex; align-items: center; margin: 5px 0; padding: 10px; background: rgba(255, 248, 240, 0.85); border-radius: 8px; border: 1px solid rgba(255, 182, 193, 0.2); }
        .task-item input[type="checkbox"] { margin-right: 10px; }
        .task-item.completed { text-decoration: line-through; color: #888; }
        input { width: 70%; padding: 10px; border: 1px solid rgba(255, 182, 193, 0.5); border-radius: 8px; background: rgba(255, 255, 255, 0.8); font-size: 14px; }
        input:focus { outline: none; border-color: rgba(255, 182, 193, 0.8); box-shadow: 0 0 5px rgba(255, 182, 193, 0.3); }
        button { padding: 10px 20px; background: rgba(255, 255, 255, 0.4); color: #5a4a4a; border: 1px solid rgba(255, 182, 193, 0.4); border-radius: 8px; margin-left: 10px; cursor: pointer; transition: all 0.3s ease; font-weight: 500; }
        button:hover { background: rgba(255, 228, 225, 0.6); transform: translateY(-1px); box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .nav { display: flex; justify-content: center; gap: 10px; margin-top: 20px; }
        .nav button { margin: 0; padding: 12px 24px; font-size: 16px; }
    </style>
</head>
<body>
    <div id="app">
        <div id="homepage" class="page active">
            <div class="content">
                <h1>每日小计</h1>
                <p>记录生活，规划未来</p>
                <div class="nav">
                    <button onclick="showPage('chatpage')">开始聊天</button>
                    <button onclick="showPage('notebookpage')">查看笔记本</button>
                </div>
            </div>
        </div>
        <div id="chatpage" class="page">
            <div class="chatpage-content">
                <div class="chat-header">
                    <h2>智能助手</h2>
                </div>
                <div class="chat-box" id="chat-box"></div>
                <div class="chat-input-area">
                    <input type="text" id="msg-input" placeholder="输入消息...">
                    <button onclick="sendMsg()">发送</button>
                    <button onclick="clearChat()">清除</button>
                    <button onclick="showPage('homepage')">返回</button>
                </div>
            </div>
        </div>
        <div id="notebookpage" class="page">
            <div class="notebook-content">
                <div class="notebook-header">
                    <h2>我的笔记本</h2>
                </div>
                <div class="notebook-pages">
                    <div id="year-page" class="notebook-page active">
                        <h3>年计划</h3>
                        <div class="plan-list" id="year-plan-list">
                            <p style="color: #333; margin: 10px 0;">在这里记录您的年度计划...</p>
                        </div>
                        <div style="margin-top: 10px; text-align: center;">
                            <button onclick="clearYearPlan()" style="background: #ff6b6b; margin: 0;">清除年计划</button>
                        </div>
                    </div>
                    <div id="daily-plan-page" class="notebook-page">
                        <h3>每日计划</h3>
                        <div class="date-nav">
                            <button onclick="changeDate('plan', -1)">←</button>
                            <input type="date" id="plan-date" value="2026-03-28">
                            <button onclick="changeDate('plan', 1)">→</button>
                            <button onclick="clearDailyPlan()" style="background: #ff6b6b; margin-left: 10px;">清除计划</button>
                        </div>
                        <div class="task-list" id="daily-task-list">
                            <p style="color: #333; margin: 10px 0;">在这里记录每日任务...</p>
                        </div>
                        <div style="margin-top: 10px;">
                            <input type="text" id="new-task-input" placeholder="添加新任务..." style="width: 70%;">
                            <button onclick="addTask()">添加</button>
                        </div>
                    </div>
                    <div id="daily-diary-page" class="notebook-page">
                        <h3>每日日记</h3>
                        <div class="date-nav">
                            <button onclick="changeDate('diary', -1)">←</button>
                            <input type="date" id="diary-date" value="2026-03-28">
                            <button onclick="changeDate('diary', 1)">→</button>
                            <button onclick="clearDailyDiary()" style="background: #ff6b6b; margin-left: 10px;">清除日记</button>
                        </div>
                        <div class="diary-content" style="background: rgba(255, 255, 255, 0.9); padding: 15px; border-radius: 10px; margin-top: 10px; max-height: 60vh; overflow-y: auto;">
                            <div class="diary-section" style="margin-bottom: 20px;">
                                <h4 style="color: #333; margin-bottom: 10px; border-bottom: 2px solid rgba(0, 0, 0, 0.2); padding-bottom: 5px;">日记</h4>
                                <div id="diary-text" style="color: #333; line-height: 1.6; white-space: pre-wrap;">在这里记录每日心情...</div>
                            </div>
                            <div class="insights-section">
                                <h4 style="color: #333; margin-bottom: 10px; border-bottom: 2px solid #ff6b6b; padding-bottom: 5px;">生活洞察与理性建议</h4>
                                <div id="insights-text" style="color: #333; line-height: 1.6; white-space: pre-wrap;">暂无内容...</div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="notebook-nav">
                    <button class="nav-btn active" onclick="showNotebookPage('year')">年计划</button>
                    <button class="nav-btn" onclick="showNotebookPage('daily-plan')">每日计划</button>
                    <button class="nav-btn" onclick="showNotebookPage('daily-diary')">每日日记</button>
                </div>
            </div>
        </div>
    </div>
    <script>
        // 存储键名
        const STORAGE_KEYS = {
            CHAT_MESSAGES: 'chat_messages',
            YEAR_PLAN: 'year_plan',
            DAILY_PLANS: 'daily_plans',
            DAILY_DIARIES: 'daily_diaries'
        };
        
        // 初始化页面
        function initApp() {
            // 设置当前日期
            const today = new Date();
            const year = today.getFullYear();
            const month = String(today.getMonth() + 1).padStart(2, '0');
            const day = String(today.getDate()).padStart(2, '0');
            const currentDate = `${year}-${month}-${day}`;
            
            document.getElementById('plan-date').value = currentDate;
            document.getElementById('diary-date').value = currentDate;
            
            loadChatMessages();
            loadYearPlan();
            loadDailyContent('plan');
            loadDailyContent('diary');
        }
        
        // 加载聊天消息
        function loadChatMessages() {
            const messages = localStorage.getItem(STORAGE_KEYS.CHAT_MESSAGES);
            if (messages) {
                document.getElementById('chat-box').innerHTML = messages;
                const box = document.getElementById('chat-box');
                box.scrollTop = box.scrollHeight;
            }
        }
        
        // 保存聊天消息
        function saveChatMessages() {
            const messages = document.getElementById('chat-box').innerHTML;
            localStorage.setItem(STORAGE_KEYS.CHAT_MESSAGES, messages);
        }
        
        // 加载年计划
        function loadYearPlan() {
            const plan = localStorage.getItem(STORAGE_KEYS.YEAR_PLAN);
            const planList = document.getElementById('year-plan-list');
            
            if (plan) {
                // 分割计划，处理可能的连续数字序号格式
                let allPlans = [];
                const lines = plan.split('\n').filter(line => line.trim() !== '');
                
                lines.forEach(line => {
                    // 检查是否包含多个数字序号的计划
                    const numberedPlans = [];
                    let currentIndex = 0;
                    const content = line;
                    
                    while (currentIndex < content.length) {
                        // 查找下一个数字序号
                        const match = content.substring(currentIndex).match(/^(\d+)\.\s*/);
                        if (match) {
                            const start = currentIndex + match[0].length;
                            // 查找下一个数字序号的位置
                            const nextMatch = content.substring(start).match(/\d+\.\s*/);
                            const end = nextMatch ? start + nextMatch.index : content.length;
                            const planText = content.substring(start, end).trim();
                            // 过滤掉只有冒号或空内容的计划，以及以冒号结尾的计划
                            if (planText && planText !== ':' && !planText.endsWith(':')) {
                                numberedPlans.push(match[1] + '. ' + planText);
                            }
                            currentIndex = end;
                        } else {
                            break;
                        }
                    }
                    
                    if (numberedPlans.length > 0) {
                        allPlans = allPlans.concat(numberedPlans);
                    } else {
                        // 过滤掉只有冒号或空内容的计划
                        const trimmedLine = line.trim();
                        if (trimmedLine && trimmedLine !== ':' && !trimmedLine.endsWith(':')) {
                            allPlans.push(trimmedLine);
                        }
                    }
                });
                
                if (allPlans.length > 0) {
                    planList.innerHTML = '';
                    allPlans.forEach((planItem, index) => {
                        // 再次过滤，确保没有空内容或只有冒号的计划
                        if (planItem && planItem.trim() && planItem.trim() !== ':' && !planItem.trim().endsWith(':')) {
                            const p = document.createElement('p');
                            p.textContent = planItem;
                            p.contentEditable = true;
                            p.addEventListener('blur', saveYearPlan);
                            planList.appendChild(p);
                        }
                    });
                }
            }
        }
        
        // 保存年计划
        function saveYearPlan() {
            const planList = document.getElementById('year-plan-list');
            const paragraphs = planList.querySelectorAll('p');
            const plan = Array.from(paragraphs).map(p => p.textContent).join('\n');
            localStorage.setItem(STORAGE_KEYS.YEAR_PLAN, plan);
        }
        
        // 加载每日内容（计划或日记）
        function loadDailyContent(type) {
            const date = document.getElementById(type + '-date').value;
            const storageKey = type === 'plan' ? STORAGE_KEYS.DAILY_PLANS : STORAGE_KEYS.DAILY_DIARIES;
            const contents = JSON.parse(localStorage.getItem(storageKey) || '{}');
            
            if (type === 'plan') {
                // 确保该日期有计划数组
                if (!contents[date]) {
                    contents[date] = [];
                }
                
                // 获取年计划中的"每天"任务
                const yearPlan = localStorage.getItem(STORAGE_KEYS.YEAR_PLAN);
                if (yearPlan) {
                    const yearPlanLines = yearPlan.split('\n').filter(line => line.trim() !== '');
                    const dailyTasks = [];
                    
                    yearPlanLines.forEach(line => {
                        const lineLower = line.toLowerCase();
                        if (lineLower.includes('每天') || lineLower.includes('每日')) {
                            // 去除序号，只保留任务内容
                            const taskText = line.replace(/^\d+\.\s*/, '').trim();
                            dailyTasks.push(taskText);
                        }
                    });
                    
                    // 添加缺失的"每天"任务
                    dailyTasks.forEach(taskText => {
                        if (!contents[date].some(task => task.text === taskText)) {
                            contents[date].push({ text: taskText, completed: false, incomplete: false });
                        }
                    });
                    
                    // 保存更新后的计划
                    localStorage.setItem(storageKey, JSON.stringify(contents));
                }
                
                const taskList = document.getElementById('daily-task-list');
                const tasks = contents[date] || [];
                
                if (tasks.length > 0) {
                    taskList.innerHTML = '';
                    tasks.forEach((task, index) => {
                        const taskItem = document.createElement('div');
                        taskItem.className = `task-item ${task.completed ? 'completed' : ''}`;
                        taskItem.innerHTML = `
                            <span style="flex: 1; text-align: left; ${task.incomplete ? 'text-decoration: line-through; color: #999;' : ''}">${task.text} ${task.completed ? '✓' : ''}</span>
                            <div style="display: flex; gap: 10px; align-items: center;">
                                <button onclick="markTaskCompleted(${index})" style="background: ${task.completed ? '#4CAF50' : '#fff'}; color: ${task.completed ? 'white' : 'black'}; border: 1px solid #ccc; padding: 4px 8px; font-size: 12px; cursor: pointer;">✓</button>
                                <button onclick="markTaskIncomplete(${index})" style="background: ${task.incomplete ? '#ff6b6b' : '#fff'}; color: ${task.incomplete ? 'white' : 'black'}; border: 1px solid #ccc; padding: 4px 8px; font-size: 12px; cursor: pointer;">×</button>
                                <button onclick="deleteTask(${index})" style="background: #ff6b6b; padding: 4px 8px; font-size: 12px;">删除</button>
                            </div>
                        `;
                        taskList.appendChild(taskItem);
                    });
                } else {
                    taskList.innerHTML = '<p style="color: #333; margin: 10px 0;">在这里记录每日任务...</p>';
                }
            } else {
                const diaryTextEl = document.getElementById('diary-text');
                const insightsTextEl = document.getElementById('insights-text');
                
                if (contents[date]) {
                    // 解析日记内容，分离日记和生活洞察
                    const content = contents[date];
                    let diaryPart = '';
                    let insightsPart = '';
                    
                    // 查找"生活洞察与理性建议"或类似关键词
                    const insightsKeywords = ['生活洞察', '理性建议', '洞察', '建议'];
                    let insightsIndex = -1;
                    
                    for (const keyword of insightsKeywords) {
                        insightsIndex = content.indexOf(keyword);
                        if (insightsIndex !== -1) {
                            break;
                        }
                    }
                    
                    if (insightsIndex !== -1) {
                        diaryPart = content.substring(0, insightsIndex).trim();
                        insightsPart = content.substring(insightsIndex).trim();
                    } else {
                        diaryPart = content;
                    }
                    
                    // 格式化内容，将分点换行
                    diaryPart = formatDiaryContent(diaryPart);
                    insightsPart = formatDiaryContent(insightsPart);
                    
                    diaryTextEl.textContent = diaryPart || '暂无日记内容...';
                    insightsTextEl.textContent = insightsPart || '暂无生活洞察与理性建议...';
                } else {
                    diaryTextEl.textContent = '在这里记录每日心情...';
                    insightsTextEl.textContent = '暂无内容...';
                }
            }
        }
        
        // 格式化日记内容，将分点换行
        function formatDiaryContent(content) {
            if (!content) return '';
            
            // 将常见的分点符号替换为换行
            return content
                .replace(/(\d+[\.、])/g, '\n$1')  // 数字序号
                .replace(/([•·])/g, '\n$1')        // 圆点符号
                .replace(/(-)/g, '\n$1')           // 横线符号
                .replace(/\n+/g, '\n')             // 去除多余换行
                .trim();
        }
        
        // 保存每日内容
        function saveDailyContent(type) {
            const date = document.getElementById(type + '-date').value;
            const storageKey = type === 'plan' ? STORAGE_KEYS.DAILY_PLANS : STORAGE_KEYS.DAILY_DIARIES;
            
            if (type === 'plan') {
                const taskList = document.getElementById('daily-task-list');
                const taskItems = taskList.querySelectorAll('.task-item');
                const tasks = Array.from(taskItems).map(item => {
                    const checkbox = item.querySelector('input[type="checkbox"]');
                    const span = item.querySelector('span');
                    return {
                        text: span.textContent,
                        completed: checkbox.checked
                    };
                });
                
                const contents = JSON.parse(localStorage.getItem(storageKey) || '{}');
                contents[date] = tasks;
                localStorage.setItem(storageKey, JSON.stringify(contents));
            } else {
                const content = document.querySelector(`#daily-${type}-page p`).textContent;
                const contents = JSON.parse(localStorage.getItem(storageKey) || '{}');
                contents[date] = content;
                localStorage.setItem(storageKey, JSON.stringify(contents));
            }
        }
        
        // 添加新任务
        function addTask() {
            const input = document.getElementById('new-task-input');
            const taskText = input.value.trim();
            
            if (taskText) {
                const date = document.getElementById('plan-date').value;
                const storageKey = STORAGE_KEYS.DAILY_PLANS;
                const contents = JSON.parse(localStorage.getItem(storageKey) || '{}');
                
                if (!contents[date]) {
                    contents[date] = [];
                }
                
                contents[date].push({ text: taskText, completed: false });
                localStorage.setItem(storageKey, JSON.stringify(contents));
                
                input.value = '';
                loadDailyContent('plan');
            }
        }
        
        // 切换任务状态
        function toggleTask(index) {
            // 保持兼容性，调用markTaskCompleted
            markTaskCompleted(index);
        }
        
        // 删除任务
        function deleteTask(index) {
            const date = document.getElementById('plan-date').value;
            const storageKey = STORAGE_KEYS.DAILY_PLANS;
            const contents = JSON.parse(localStorage.getItem(storageKey) || '{}');
            
            if (contents[date] && contents[date][index]) {
                contents[date].splice(index, 1);
                localStorage.setItem(storageKey, JSON.stringify(contents));
                loadDailyContent('plan');
            }
        }
        
        // 标记任务为完成
        function markTaskCompleted(index) {
            const date = document.getElementById('plan-date').value;
            const storageKey = STORAGE_KEYS.DAILY_PLANS;
            const contents = JSON.parse(localStorage.getItem(storageKey) || '{}');
            
            if (contents[date] && contents[date][index]) {
                contents[date][index].completed = true;
                contents[date][index].incomplete = false;
                localStorage.setItem(storageKey, JSON.stringify(contents));
                loadDailyContent('plan');
            }
        }
        
        // 标记任务为未完成（添加删除线）
        function markTaskIncomplete(index) {
            const date = document.getElementById('plan-date').value;
            const storageKey = STORAGE_KEYS.DAILY_PLANS;
            const contents = JSON.parse(localStorage.getItem(storageKey) || '{}');
            
            if (contents[date] && contents[date][index]) {
                contents[date][index].completed = false;
                contents[date][index].incomplete = true;
                localStorage.setItem(storageKey, JSON.stringify(contents));
                loadDailyContent('plan');
            }
        }
        
        let currentPageIndex = 0;
        const pages = ['homepage', 'chatpage', 'notebookpage'];
        
        // 日记收集状态
        let isCollectingDiary = false;
        let diaryContent = [];
        let diaryDate = null;
        
        function showPage(page) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(page).classList.add('active');
            currentPageIndex = pages.indexOf(page);
        }
        
        // 触摸滑动切换页面
        let touchStartX = 0;
        document.addEventListener('touchstart', function(e) {
            touchStartX = e.touches[0].clientX;
        });
        
        document.addEventListener('touchend', function(e) {
            const touchEndX = e.changedTouches[0].clientX;
            const diff = touchStartX - touchEndX;
            
            if (Math.abs(diff) > 50) {
                if (diff > 0 && currentPageIndex < pages.length - 1) {
                    // 向右滑动，显示下一页
                    currentPageIndex++;
                    showPage(pages[currentPageIndex]);
                } else if (diff < 0 && currentPageIndex > 0) {
                    // 向左滑动，显示上一页
                    currentPageIndex--;
                    showPage(pages[currentPageIndex]);
                }
            }
        });
        
        function showNotebookPage(pageType) {
            document.querySelectorAll('.notebook-page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            
            if (pageType === 'year') {
                document.getElementById('year-page').classList.add('active');
            } else if (pageType === 'daily-plan') {
                document.getElementById('daily-plan-page').classList.add('active');
                loadDailyContent('plan');
            } else if (pageType === 'daily-diary') {
                document.getElementById('daily-diary-page').classList.add('active');
                loadDailyContent('diary');
            }
            
            event.target.classList.add('active');
        }
        
        function changeDate(type, days) {
            const dateInput = document.getElementById(type + '-date');
            const currentDate = new Date(dateInput.value);
            currentDate.setDate(currentDate.getDate() + days);
            
            const year = currentDate.getFullYear();
            const month = String(currentDate.getMonth() + 1).padStart(2, '0');
            const day = String(currentDate.getDate()).padStart(2, '0');
            
            dateInput.value = `${year}-${month}-${day}`;
            loadDailyContent(type);
        }
        
        function sendMsg() {
            const input = document.getElementById('msg-input');
            const msg = input.value.trim();
            if (msg) {
                const box = document.getElementById('chat-box');
                box.innerHTML += '<div style="padding: 12px; background: rgba(255, 228, 225, 0.9); color: #5a4a4a; margin: 8px 0; margin-left: 20%; border-radius: 15px 15px 0 15px; text-align: right; border: 1px solid rgba(255, 182, 193, 0.4); box-shadow: 0 2px 5px rgba(0,0,0,0.05);">' + msg + '</div>';
                
                // 解析消息并添加到计划
                const response = processMessage(msg);
                box.innerHTML += '<div style="padding: 12px; background: rgba(255, 248, 240, 0.9); color: #5a4a4a; margin: 8px 0; margin-right: 20%; border-radius: 15px 15px 15px 0; border: 1px solid rgba(255, 228, 196, 0.4); box-shadow: 0 2px 5px rgba(0,0,0,0.05);">' + response + '</div>';
                
                input.value = '';
                box.scrollTop = box.scrollHeight;
                saveChatMessages();
            }
        }
        
        // 处理消息并添加到计划
        function processMessage(msg) {
            // 处理日记收集
            if (isCollectingDiary) {
                // 检测结束日记
                if (msg.includes('结束日记') || msg.includes('结束日记')) {
                    return finishDiary();
                }
                // 收集日记内容
                diaryContent.push(msg);
                return '继续记录日记，输入"结束日记"完成记录。';
            }
            
            // 检测开始日记
            if (msg.includes('开始日记') || msg.includes('开始日记')) {
                return startDiary(msg);
            }
            
            // 处理年计划
            if (msg.includes('年计划') || msg.includes('年度计划')) {
                return addYearPlan(msg);
            }
            
            // 处理周计划（如：135想干...）
            if (msg.includes('135') || msg.includes('周一') || msg.includes('周三') || msg.includes('周五')) {
                return addWeeklyPlan(msg);
            }
            
            // 处理每日计划
            if (msg.includes('计划') || msg.includes('任务')) {
                return addDailyPlan(msg);
            }
            
            // 默认回复
            return '我是您的每日小计助手，有什么可以帮您的吗？';
        }
        
        // 添加年计划
        function addYearPlan(msg) {
            // 提取年计划内容
            let planContent = msg;
            if (msg.includes('年计划')) {
                planContent = msg.split('年计划')[1].trim();
                // 移除开头的冒号
                planContent = planContent.replace(/^[:：]/, '').trim();
            }
            if (msg.includes('年度计划')) {
                planContent = msg.split('年度计划')[1].trim();
                // 移除开头的冒号
                planContent = planContent.replace(/^[:：]/, '').trim();
            }
            
            if (planContent) {
                // 解析计划内容，按数字序号分割成单独的行
                const plans = [];
                let currentIndex = 0;
                const content = planContent;
                
                while (currentIndex < content.length) {
                    // 查找下一个数字序号
                    const match = content.substring(currentIndex).match(/^(\d+)\.\s*/);
                    if (match) {
                        const start = currentIndex + match[0].length;
                        // 查找下一个数字序号的位置
                        const nextMatch = content.substring(start).match(/\d+\.\s*/);
                        const end = nextMatch ? start + nextMatch.index : content.length;
                        const planText = content.substring(start, end).trim();
                        // 过滤掉只有冒号或空内容的计划
                        if (planText && planText !== ':') {
                            plans.push(match[1] + '. ' + planText);
                        }
                        currentIndex = end;
                    } else {
                        break;
                    }
                }
                
                // 如果没有找到数字序号，按分号分割
                if (plans.length === 0) {
                    const parts = planContent.split(/[;；]/).filter(p => p.trim() !== '' && p.trim() !== ':');
                    parts.forEach((part, index) => {
                        plans.push((index + 1) + '. ' + part.trim());
                    });
                }
                
                if (plans.length > 0) {
                    // 清空现有计划，避免重复
                    localStorage.setItem(STORAGE_KEYS.YEAR_PLAN, plans.join('\n'));
                    loadYearPlan();
                    
                    // 同时添加到每日计划
                    const storageKey = STORAGE_KEYS.DAILY_PLANS;
                    const contents = JSON.parse(localStorage.getItem(storageKey) || '{}');
                    
                    // 添加包含"每天"、"每日"等关键词的计划到所有日期的任务（去除序号）
                    const dailyPlans = plans.filter(plan => {
                        const planText = plan.toLowerCase();
                        return planText.includes('每天') || planText.includes('每日');
                    });
                    
                    if (dailyPlans.length > 0) {
                        // 为每一天添加任务
                        dailyPlans.forEach(plan => {
                            // 去除序号，只保留计划内容
                            const planText = plan.replace(/^\d+\.\s*/, '').trim();
                            
                            // 遍历所有已有的日期
                            for (const dateStr in contents) {
                                if (!contents[dateStr].some(task => task.text === planText)) {
                                    contents[dateStr].push({ text: planText, completed: false, incomplete: false });
                                }
                            }
                        });
                        
                        localStorage.setItem(storageKey, JSON.stringify(contents));
                        
                        // 如果当前在每日计划页面，重新加载
                        if (document.getElementById('daily-plan-page').classList.contains('active')) {
                            const currentDate = document.getElementById('plan-date').value;
                            loadDailyContent('plan');
                        }
                    } else {
                        // 如果没有包含"每天"的计划，则添加前3个计划到今天
                        const today = new Date().toISOString().split('T')[0];
                        if (!contents[today]) {
                            contents[today] = [];
                        }
                        
                        const plansToAdd = plans.slice(0, 3);
                        plansToAdd.forEach(plan => {
                            // 去除序号，只保留计划内容
                            const planText = plan.replace(/^\d+\.\s*/, '').trim();
                            if (!contents[today].some(task => task.text === planText)) {
                                contents[today].push({ text: planText, completed: false, incomplete: false });
                            }
                        });
                        
                        localStorage.setItem(storageKey, JSON.stringify(contents));
                        
                        // 如果当前在每日计划页面且日期是今天，重新加载
                        if (document.getElementById('daily-plan-page').classList.contains('active')) {
                            const currentDate = document.getElementById('plan-date').value;
                            if (currentDate === today) {
                                loadDailyContent('plan');
                            }
                        }
                    }
                    
                    if (dailyPlans.length > 0) {
                        return `已将年计划添加到笔记本中，并将${dailyPlans.length}个"每天"相关计划添加到所有日期的任务中！`;
                    } else {
                        return '已将年计划添加到笔记本中，并将前3个计划添加到今日任务！';
                    }
                }
            }
            return '请输入具体的年计划内容。';
        }
        
        // 添加周计划（135）
        function addWeeklyPlan(msg) {
            // 提取任务内容
            let taskContent = msg;
            // 提取任务内容，支持多种表达方式
            if (msg.includes('想') || msg.includes('要') || msg.includes('做') || msg.includes('读书')) {
                // 尝试提取任务内容
                const patterns = [
                    /(?:想|要|做|读书)\s*(.+)/,
                    /周一、周三、周五\s*(.+)/,
                    /135\s*(.+)/
                ];
                
                for (const pattern of patterns) {
                    const match = msg.match(pattern);
                    if (match) {
                        taskContent = match[1].trim();
                        break;
                    }
                }
            }
            
            // 如果没有提取到内容，使用默认任务名
            if (!taskContent || taskContent === msg) {
                taskContent = '读书';
            }
            
            if (taskContent) {
                // 获取当前日期
                const today = new Date();
                const currentWeekday = today.getDay(); // 0-6，0是周日
                
                // 计算本周的周一、周三、周五
                const dates = [];
                
                // 周一
                const monday = new Date(today);
                const daysToMonday = (currentWeekday === 0) ? 1 : 1 - currentWeekday;
                monday.setDate(today.getDate() + daysToMonday);
                dates.push(monday);
                
                // 周三
                const wednesday = new Date(monday);
                wednesday.setDate(monday.getDate() + 2);
                dates.push(wednesday);
                
                // 周五
                const friday = new Date(wednesday);
                friday.setDate(wednesday.getDate() + 2);
                dates.push(friday);
                
                // 添加到每日计划
                let addedCount = 0;
                dates.forEach(date => {
                    const dateStr = date.toISOString().split('T')[0];
                    const storageKey = STORAGE_KEYS.DAILY_PLANS;
                    const contents = JSON.parse(localStorage.getItem(storageKey) || '{}');
                    
                    if (!contents[dateStr]) {
                        contents[dateStr] = [];
                    }
                    
                    // 检查任务是否已经存在
                    const taskExists = contents[dateStr].some(task => task.text === taskContent);
                    if (!taskExists) {
                        contents[dateStr].push({ text: taskContent, completed: false, incomplete: false });
                        localStorage.setItem(storageKey, JSON.stringify(contents));
                        addedCount++;
                    }
                });
                
                if (addedCount > 0) {
                    return `已将任务"${taskContent}"添加到本周${addedCount}个周一、周三、周五的计划中！`;
                } else {
                    return `任务"${taskContent}"已经存在于本周的周一、周三、周五计划中！`;
                }
            }
            return '请输入具体的任务内容。';
        }
        
        // 添加每日计划
        function addDailyPlan(msg) {
            const today = new Date().toISOString().split('T')[0];
            const storageKey = STORAGE_KEYS.DAILY_PLANS;
            const contents = JSON.parse(localStorage.getItem(storageKey) || '{}');
            
            if (!contents[today]) {
                contents[today] = [];
            }
            
            contents[today].push({ text: msg, completed: false, incomplete: false });
            localStorage.setItem(storageKey, JSON.stringify(contents));
            
            // 如果当前在每日计划页面且日期是今天，重新加载
            if (document.getElementById('daily-plan-page').classList.contains('active')) {
                const currentDate = document.getElementById('plan-date').value;
                if (currentDate === today) {
                    loadDailyContent('plan');
                }
            }
            
            return '已将任务添加到今天的计划中！';
        }
        
        // 开始日记收集
        function startDiary(msg) {
            isCollectingDiary = true;
            diaryContent = [];
            diaryDate = null; // 暂时不设置日期，等待从正文提取
            
            return '开始记录日记，请输入日记内容，输入"结束日记"完成记录。';
        }
        
        // 结束日记收集并保存
        function finishDiary() {
            if (diaryContent.length === 0) {
                isCollectingDiary = false;
                return '日记内容为空，已取消记录。';
            }
            
            // 整理日记内容
            const diaryText = diaryContent.join('\n');
            
            // 从日记内容中提取日期
            let extractedDate = diaryDate;
            
            // 如果没有提取到日期，使用今天的日期
            if (!extractedDate) {
                extractedDate = new Date().toISOString().split('T')[0];
            }
            
            // 中文月份映射
            const chineseMonths = {
                '一': '01', '二': '02', '三': '03', '四': '04',
                '五': '05', '六': '06', '七': '07', '八': '08',
                '九': '09', '十': '10', '十一': '11', '十二': '12'
            };
            
            // 中文日期映射
            const chineseDays = {
                '一': '01', '二': '02', '三': '03', '四': '04', '五': '05',
                '六': '06', '七': '07', '八': '08', '九': '09', '十': '10',
                '十一': '11', '十二': '12', '十三': '13', '十四': '14', '十五': '15',
                '十六': '16', '十七': '17', '十八': '18', '十九': '19', '二十': '20',
                '二十一': '21', '二十二': '22', '二十三': '23', '二十四': '24', '二十五': '25',
                '二十六': '26', '二十七': '27', '二十八': '28', '二十九': '29', '三十': '30',
                '三十一': '31'
            };
            
            // 尝试匹配阿拉伯数字日期格式：3月26日 或 2026.03.26 或 2026/03/26 或 2026-03-26
            const arabicDatePatterns = [
                /(\d{4})[\.\-\/](\d{1,2})[\.\-\/](\d{1,2})/,  // 2026.03.26 或 2026/03/26 或 2026-03-26
                /(\d{1,2})月(\d{1,2})日/                       // 3月26日
            ];
            
            for (const pattern of arabicDatePatterns) {
                const arabicMatch = diaryText.match(pattern);
                if (arabicMatch) {
                    console.log('匹配到阿拉伯数字日期:', arabicMatch[0]);
                    if (arabicMatch.length === 4) {
                        // 2026.03.26 格式
                        const year = arabicMatch[1];
                        const month = arabicMatch[2].padStart(2, '0');
                        const day = arabicMatch[3].padStart(2, '0');
                        extractedDate = `${year}-${month}-${day}`;
                    } else {
                        // 3月26日 格式
                        const currentYear = new Date().getFullYear();
                        const month = arabicMatch[1].padStart(2, '0');
                        const day = arabicMatch[2].padStart(2, '0');
                        extractedDate = `${currentYear}-${month}-${day}`;
                    }
                    console.log('提取的日期:', extractedDate);
                    break;
                }
            }
            
            // 尝试匹配中文日期格式：三月二十六日
            if (!extractedDate) {
                // 尝试匹配各种中文日期格式
                const chineseDatePatterns = [
                    /([一二三四五六七八九十]+)月([一二三四五六七八九十]+)日/,
                    /([一二三四五六七八九十])月([一二三四五六七八九十]+)日/,
                    /([一二三四五六七八九十]+)月([一二三四五六七八九十])日/
                ];
                
                for (const pattern of chineseDatePatterns) {
                    const chineseMatch = diaryText.match(pattern);
                    if (chineseMatch) {
                        console.log('匹配到中文日期:', chineseMatch[0]);
                        console.log('月份:', chineseMatch[1], '->', chineseMonths[chineseMatch[1]]);
                        console.log('日期:', chineseMatch[2], '->', chineseDays[chineseMatch[2]]);
                        const currentYear = new Date().getFullYear();
                        const month = chineseMonths[chineseMatch[1]];
                        const day = chineseDays[chineseMatch[2]];
                        if (month && day) {
                            extractedDate = `${currentYear}-${month}-${day}`;
                            console.log('提取的日期:', extractedDate);
                            break;
                        }
                    }
                }
            }
            
            // 尝试匹配数字日期格式
            if (!extractedDate) {
                const datePatterns = [
                    /(\d{4})年(\d{1,2})月(\d{1,2})日/,
                    /(\d{4})-(\d{1,2})-(\d{1,2})/,
                    /(\d{4})\/(\d{1,2})\/(\d{1,2})/
                ];
                
                for (const pattern of datePatterns) {
                    const match = diaryText.match(pattern);
                    if (match) {
                        const year = match[1];
                        const month = match[2].padStart(2, '0');
                        const day = match[3].padStart(2, '0');
                        extractedDate = `${year}-${month}-${day}`;
                        break;
                    }
                }
            }
            
            // 保存到每日日记
            const storageKey = STORAGE_KEYS.DAILY_DIARIES;
            const contents = JSON.parse(localStorage.getItem(storageKey) || '{}');
            
            // 如果已有日记内容，追加新内容
            if (contents[extractedDate]) {
                contents[extractedDate] += '\n\n' + diaryText;
            } else {
                contents[extractedDate] = diaryText;
            }
            
            localStorage.setItem(storageKey, JSON.stringify(contents));
            
            // 重置日记收集状态
            isCollectingDiary = false;
            const savedDate = extractedDate;
            diaryContent = [];
            diaryDate = null;
            
            // 如果当前在每日日记页面且日期匹配，重新加载
            if (document.getElementById('daily-diary-page').classList.contains('active')) {
                const currentDate = document.getElementById('diary-date').value;
                if (currentDate === savedDate) {
                    loadDailyContent('diary');
                }
            }
            
            return `日记已保存到${savedDate}！`;
        }
        
        // 为内容添加编辑功能
        function makeContentEditable() {
            // 年计划编辑
            const yearPlanPara = document.querySelector('#year-page p');
            yearPlanPara.contentEditable = true;
            yearPlanPara.addEventListener('blur', saveYearPlan);
            
            // 每日计划编辑
            const planPara = document.querySelector('#daily-plan-page p');
            planPara.contentEditable = true;
            planPara.addEventListener('blur', () => saveDailyContent('plan'));
            
            // 每日日记编辑
            const diaryPara = document.querySelector('#daily-diary-page p');
            diaryPara.contentEditable = true;
            diaryPara.addEventListener('blur', () => saveDailyContent('diary'));
        }
        
        // 清除聊天记录
        function clearChat() {
            const box = document.getElementById('chat-box');
            box.innerHTML = '';
            localStorage.removeItem(STORAGE_KEYS.CHAT_MESSAGES);
        }
        
        // 清除年计划
        function clearYearPlan() {
            if (confirm('确定要清除所有年计划吗？')) {
                localStorage.removeItem(STORAGE_KEYS.YEAR_PLAN);
                const planList = document.getElementById('year-plan-list');
                planList.innerHTML = '<p style="color: #333; margin: 10px 0;">在这里记录您的年度计划...</p>';
                // 重新绑定编辑事件
                makeContentEditable();
            }
        }
        
        // 清除当前日期的每日计划
        function clearDailyPlan() {
            if (confirm('确定要清除当前日期的每日计划吗？')) {
                const date = document.getElementById('plan-date').value;
                const storageKey = STORAGE_KEYS.DAILY_PLANS;
                const contents = JSON.parse(localStorage.getItem(storageKey) || '{}');
                
                if (contents[date]) {
                    delete contents[date];
                    localStorage.setItem(storageKey, JSON.stringify(contents));
                    loadDailyContent('plan');
                }
            }
        }
        
        // 清除当前日期的每日日记
        function clearDailyDiary() {
            if (confirm('确定要清除当前日期的每日日记吗？')) {
                const date = document.getElementById('diary-date').value;
                const storageKey = STORAGE_KEYS.DAILY_DIARIES;
                const contents = JSON.parse(localStorage.getItem(storageKey) || '{}');
                
                if (contents[date]) {
                    delete contents[date];
                    localStorage.setItem(storageKey, JSON.stringify(contents));
                    loadDailyContent('diary');
                }
            }
        }
        
        // 页面加载完成后初始化
        window.onload = function() {
            initApp();
            makeContentEditable();
        };
    </script>
